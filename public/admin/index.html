<!doctype html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Esdeveniments — Administració Espai Econòmic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css?v=28">
</head>
<body>
<div class="admin-shell">
  <div class="admin-topbar" style="justify-content:flex-end;">
    <button type="button" id="btn-logout" class="btn-secundari">Tanca sessió</button>
  </div>

  <div class="admin-mobile-tabs">
    <button type="button" class="admin-mobile-tab admin-mobile-tab--actiu" data-tab="crear">Crear esdeveniment</button>
    <button type="button" class="admin-mobile-tab" data-tab="esdeveniments">Esdeveniments</button>
    <button type="button" class="admin-mobile-tab" data-tab="calendari">Calendari</button>
  </div>

  <div class="admin-columns">
    <div class="admin-col" data-panell="crear">
      <h2 class="admin-col-title">Crear esdeveniment</h2>
      <form id="form-evento" class="admin-form">
        <label for="nombre">Nom</label>
        <input type="text" id="nombre" name="nombre" required>

        <div class="camp-amb-minicalendari camps-dates-parella">
          <div class="camp-data">
            <label for="fecha">Data de l'esdeveniment</label>
            <input type="text" id="fecha" name="fecha" placeholder="Tria un dia al calendari" readonly required autocomplete="off">
          </div>
          <div class="camp-data">
            <label for="fecha_limite_compra">Data límit de compra</label>
            <input type="text" id="fecha_limite_compra" name="fecha_limite_compra" placeholder="Tria un dia al calendari" readonly required autocomplete="off">
          </div>

          <div class="mini-calendari hidden" id="mini-calendari-limit">
            <p class="mini-calendari-titol" id="mini-calendari-titol">Tria la data de l'esdeveniment</p>
            <div class="admin-calendari-header">
              <button type="button" class="btn-calendari-nav" id="limit-mes-anterior" aria-label="Mes anterior">‹</button>
              <span class="admin-calendari-mes" id="limit-mes-actual"></span>
              <button type="button" class="btn-calendari-nav" id="limit-mes-seguent" aria-label="Mes següent">›</button>
            </div>
            <div class="admin-calendari-diesetmana">
              <span>DL</span><span>DM</span><span>DC</span><span>DJ</span><span>DV</span><span>DS</span><span>DG</span>
            </div>
            <div class="admin-calendari-graella" id="limit-graella"></div>
            <div class="mini-calendari-hora">
              <label for="mini-calendari-hora-input">Hora</label>
              <input type="time" id="mini-calendari-hora-input">
            </div>
            <button type="button" class="btn-secundari mini-calendari-seguent hidden" id="mini-calendari-seguent">Següent: tria el límit ›</button>
            <div class="mini-calendari-llegenda">
              <span><i class="calendari-punt calendari-punt--marcat"></i> Dia de l'esdeveniment</span>
              <span><i class="calendari-punt calendari-punt--interval"></i> Dies vàlids per al termini</span>
            </div>
          </div>
        </div>

        <label for="descripcion">Descripció</label>
        <input type="text" id="descripcion" name="descripcion">

        <label for="precio">Preu (€)</label>
        <input type="number" id="precio" name="precio" min="0.01" step="0.01" required>

        <label for="aforo_total">Aforament total</label>
        <input type="number" id="aforo_total" name="aforo_total" min="1" step="1" required>

        <button type="submit" class="btn-primary">Crear esdeveniment</button>
        <p id="error-evento" style="color:#b3261e; font-size:12px; margin-top:10px; font-family:var(--font-sans);"></p>
      </form>
    </div>

    <div class="admin-col" data-panell="esdeveniments">
      <h2 class="admin-col-title">Esdeveniments</h2>
      <div class="admin-table-scroll">
        <table class="admin-table admin-table--eventos">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Data</th>
              <th>Preu</th>
              <th>Aforament</th>
              <th>Estat</th>
            </tr>
          </thead>
          <tbody id="taula-eventos"></tbody>
        </table>
      </div>
    </div>

    <div class="admin-col admin-col--calendari" data-panell="calendari">
      <h2 class="admin-col-title">Calendari</h2>
      <div class="admin-calendari" id="calendari-eventos">
        <div class="admin-calendari-header">
          <button type="button" class="btn-calendari-nav" id="calendari-mes-anterior" aria-label="Mes anterior">‹</button>
          <span class="admin-calendari-mes" id="calendari-mes-actual"></span>
          <button type="button" class="btn-calendari-nav" id="calendari-mes-seguent" aria-label="Mes següent">›</button>
        </div>
        <div class="admin-calendari-diesetmana">
          <span>DL</span><span>DM</span><span>DC</span><span>DJ</span><span>DV</span><span>DS</span><span>DG</span>
        </div>
        <div class="admin-calendari-graella" id="calendari-graella"></div>
        <div class="admin-calendari-llegenda">
          <span><i class="calendari-punt calendari-punt--verd"></i> Compra oberta</span>
          <span><i class="calendari-punt calendari-punt--vermell"></i> Tancat (esgotat / termini)</span>
          <span><i class="calendari-punt calendari-punt--gris"></i> Ja celebrat</span>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/admin.js?v=28"></script>
</body>
</html>
